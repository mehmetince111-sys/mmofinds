<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a18cd1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbc2eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dataGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <filter id="cloudShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#a18cd1" flood-opacity="0.4"/>
    </filter>
    <filter id="cloudGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <circle cx="100" cy="100" r="80" fill="url(#cloudGrad)" opacity="0.1" filter="url(#cloudShadow)"/>
  
  <!-- Cloud shape - bottom layer -->
  <ellipse cx="100" cy="130" rx="45" ry="25" fill="url(#cloudGrad)" opacity="0.3"/>
  
  <!-- Cloud shape - main -->
  <ellipse cx="80" cy="110" rx="30" ry="22" fill="url(#cloudGrad)" filter="url(#cloudShadow)"/>
  <ellipse cx="115" cy="105" rx="28" ry="20" fill="url(#cloudGrad)" opacity="0.9"/>
  <ellipse cx="95" cy="95" rx="25" ry="20" fill="url(#cloudGrad)" filter="url(#cloudShadow)"/>
  <ellipse cx="70" cy="105" rx="18" ry="15" fill="url(#cloudGrad)" opacity="0.8"/>
  <ellipse cx="125" cy="115" rx="15" ry="12" fill="url(#cloudGrad)" opacity="0.7"/>
  
  <!-- Cloud highlight -->
  <ellipse cx="95" cy="90" rx="18" ry="14" fill="white" opacity="0.15"/>
  
  <!-- Data nodes inside cloud -->
  <circle cx="85" cy="100" r="5" fill="url(#dataGrad)" filter="url(#cloudGlow)"/>
  <circle cx="105" cy="95" r="4" fill="url(#dataGrad)" filter="url(#cloudGlow)"/>
  <circle cx="95" cy="110" r="4.5" fill="url(#dataGrad)" filter="url(#cloudGlow)"/>
  <circle cx="115" cy="108" r="3.5" fill="url(#dataGrad)" filter="url(#cloudGlow)"/>
  <circle cx="75" cy="108" r="3.5" fill="url(#dataGrad)" filter="url(#cloudGlow)"/>
  
  <!-- Data connections -->
  <line x1="85" y1="100" x2="105" y2="95" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="105" y1="95" x2="95" y2="110" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="95" y1="110" x2="115" y2="108" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="85" y1="100" x2="75" y2="108" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="75" y1="108" x2="95" y2="110" stroke="white" stroke-width="1" opacity="0.3"/>
  
  <!-- Upload/download arrows -->
  <path d="M 100 50 L 100 70" stroke="url(#dataGrad)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M 95 60 L 100 55 L 105 60" fill="none" stroke="url(#dataGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  
  <path d="M 100 145 L 100 160" stroke="url(#dataGrad)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M 95 155 L 100 160 L 105 155" fill="none" stroke="url(#dataGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  
  <!-- Floating data particles -->
  <circle cx="60" cy="70" r="2" fill="url(#dataGrad)" opacity="0.5"/>
  <circle cx="140" cy="65" r="2.5" fill="url(#dataGrad)" opacity="0.4"/>
  <circle cx="55" cy="140" r="2" fill="url(#cloudGrad)" opacity="0.4"/>
  <circle cx="145" cy="135" r="2" fill="url(#cloudGrad)" opacity="0.3"/>
</svg>
