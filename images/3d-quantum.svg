<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="qbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0a1e"/>
      <stop offset="100%" style="stop-color:#1a1040"/>
    </linearGradient>
    <linearGradient id="qorbit1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="qorbit2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="qorbit3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <linearGradient id="qcore" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e7ff"/>
      <stop offset="50%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <filter id="qshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#818cf8" flood-opacity="0.5"/>
    </filter>
    <filter id="qglow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="nucleus" cx="40%" cy="35%" r="60%">
      <stop offset="0%" style="stop-color:#c7d2fe"/>
      <stop offset="100%" style="stop-color:#4338ca"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" rx="20" fill="url(#qbg)" opacity="0.2"/>
  <!-- Orbit 1 (horizontal) -->
  <ellipse cx="100" cy="100" rx="75" ry="25" fill="none" stroke="url(#qorbit1)" stroke-width="2" opacity="0.6" transform="rotate(0,100,100)"/>
  <!-- Orbit 2 (rotated) -->
  <ellipse cx="100" cy="100" rx="75" ry="25" fill="none" stroke="url(#qorbit2)" stroke-width="2" opacity="0.6" transform="rotate(60,100,100)"/>
  <!-- Orbit 3 (rotated) -->
  <ellipse cx="100" cy="100" rx="75" ry="25" fill="none" stroke="url(#qorbit3)" stroke-width="2" opacity="0.6" transform="rotate(120,100,100)"/>
  <!-- Nucleus/Core -->
  <g filter="url(#qshadow)">
    <circle cx="100" cy="100" r="18" fill="url(#nucleus)" filter="url(#qglow)"/>
    <circle cx="100" cy="100" r="10" fill="#1e1b4b" opacity="0.4"/>
    <circle cx="100" cy="100" r="5" fill="#e0e7ff" opacity="0.7"/>
  </g>
  <!-- Electron 1 -->
  <circle cx="25" cy="100" r="5" fill="#06b6d4" filter="url(#qglow)"/>
  <!-- Electron 2 -->
  <circle cx="162" cy="57" r="5" fill="#8b5cf6" filter="url(#qglow)"/>
  <!-- Electron 3 -->
  <circle cx="38" cy="143" r="5" fill="#f59e0b" filter="url(#qglow)"/>
  <!-- Quantum wave lines -->
  <path d="M40 100 Q55 85 70 100 Q85 115 100 100 Q115 85 130 100 Q145 115 160 100" fill="none" stroke="#818cf8" stroke-width="1.5" opacity="0.3"/>
  <path d="M100 40 Q85 55 100 70 Q115 85 100 100 Q85 115 100 130 Q115 145 100 160" fill="none" stroke="#818cf8" stroke-width="1.5" opacity="0.3"/>
  <!-- Quantum symbol Q -->
  <text x="100" y="106" text-anchor="middle" font-family="serif" font-size="16" font-weight="bold" fill="#e0e7ff" opacity="0.9">Q</text>
</svg>
