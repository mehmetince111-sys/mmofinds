<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#1a2744"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#4a9eff"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Dashboard frame -->
  <rect x="200" y="80" width="400" height="250" rx="10" fill="#1a1a2e" stroke="#4a9eff" stroke-width="2"/>
  <!-- Dashboard content areas -->
  <rect x="220" y="100" width="180" height="100" rx="5" fill="#0f1923"/>
  <rect x="420" y="100" width="160" height="100" rx="5" fill="#0f1923"/>
  <rect x="220" y="220" width="360" height="90" rx="5" fill="#0f1923"/>
  <!-- Weather widget -->
  <text x="310" y="140" text-anchor="middle" fill="#4a9eff" font-size="14" font-family="Arial, sans-serif">WETTER</text>
  <text x="310" y="170" text-anchor="middle" fill="white" font-size="24" font-weight="bold" font-family="Arial, sans-serif">22°C</text>
  <text x="310" y="190" text-anchor="middle" fill="#8b5cf6" font-size="12" font-family="Arial, sans-serif">Sonnig ☀️</text>
  <!-- Energy widget -->
  <text x="500" y="140" text-anchor="middle" fill="#22c55e" font-size="14" font-family="Arial, sans-serif">ENERGIE</text>
  <text x="500" y="170" text-anchor="middle" fill="white" font-size="24" font-weight="bold" font-family="Arial, sans-serif">3.2 kW</text>
  <text x="500" y="190" text-anchor="middle" fill="#8b5cf6" font-size="12" font-family="Arial, sans-serif">Verbrauch</text>
  <!-- Calendar widget -->
  <text x="400" y="255" text-anchor="middle" fill="#4a9eff" font-size="14" font-family="Arial, sans-serif">KALENDER</text>
  <text x="400" y="280" text-anchor="middle" fill="white" font-size="12" font-family="Arial, sans-serif">Mittwoch, 20. Juni 2026</text>
  <text x="400" y="300" text-anchor="middle" fill="#8b5cf6" font-size="11" font-family="Arial, sans-serif">14:00 — Team Meeting</text>
  <!-- Raspberry Pi icon -->
  <rect x="370" y="350" width="60" height="40" rx="3" fill="#c1272d" opacity="0.8"/>
  <text x="400" y="375" text-anchor="middle" fill="white" font-size="10" font-weight="bold" font-family="Arial, sans-serif">Pi 5</text>
  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" fill="white" font-size="24" font-weight="bold" font-family="Arial, sans-serif">KI Smart-Home-Dashboard</text>
  <text x="400" y="70" text-anchor="middle" fill="#22c55e" font-size="14" font-family="Arial, sans-serif">Raspberry Pi + Touchscreen + Lokale KI</text>
  <!-- Decorative circuit lines -->
  <line x1="50" y1="200" x2="150" y2="200" stroke="#22c55e" stroke-width="1" opacity="0.3"/>
  <line x1="650" y1="200" x2="750" y2="200" stroke="#4a9eff" stroke-width="1" opacity="0.3"/>
  <circle cx="150" cy="200" r="4" fill="#22c55e" opacity="0.5"/>
  <circle cx="650" cy="200" r="4" fill="#4a9eff" opacity="0.5"/>
</svg>
