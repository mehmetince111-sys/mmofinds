<!-- 3D AI Video Generation Icon -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#c4b5fd"/>
    </linearGradient>
    <filter id="shadow1">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#6366f1" flood-opacity="0.4"/>
    </filter>
  </defs>
  <!-- Camera body -->
  <rect x="20" y="35" width="88" height="58" rx="12" fill="url(#g1)" filter="url(#shadow1)"/>
  <!-- Lens -->
  <circle cx="64" cy="64" r="22" fill="#1e1b4b" stroke="url(#g2)" stroke-width="3"/>
  <circle cx="64" cy="64" r="14" fill="#312e81"/>
  <circle cx="64" cy="64" r="7" fill="#4338ca"/>
  <circle cx="68" cy="60" r="3" fill="#a78bfa" opacity="0.8"/>
  <!-- Viewfinder -->
  <rect x="48" y="25" width="32" height="14" rx="4" fill="url(#g1)" filter="url(#shadow1)"/>
  <!-- Flash -->
  <circle cx="90" cy="42" r="5" fill="#fbbf24" opacity="0.9"/>
  <!-- AI sparkles -->
  <circle cx="30" cy="30" r="3" fill="#a78bfa" opacity="0.7"/>
  <circle cx="100" cy="28" r="2" fill="#c4b5fd" opacity="0.6"/>
  <circle cx="105" cy="85" r="2.5" fill="#8b5cf6" opacity="0.5"/>
  <circle cx="25" cy="90" r="2" fill="#a78bfa" opacity="0.6"/>
  <!-- Play triangle -->
  <polygon points="56,58 56,70 68,64" fill="#a78bfa"/>
</svg>
