<!-- 3D Data Analytics Icon -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="ag1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <linearGradient id="ag2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#6ee7b7"/>
    </linearGradient>
    <linearGradient id="ag3" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#047857"/>
      <stop offset="100%" style="stop-color:#a7f3d0"/>
    </linearGradient>
    <filter id="ashadow">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#10b981" flood-opacity="0.35"/>
    </filter>
  </defs>
  <!-- Chart background -->
  <rect x="16" y="20" width="96" height="88" rx="8" fill="#064e3b" opacity="0.3"/>
  <!-- Grid lines -->
  <g stroke="#34d399" stroke-width="0.5" opacity="0.2">
    <line x1="24" y1="35" x2="104" y2="35"/>
    <line x1="24" y1="50" x2="104" y2="50"/>
    <line x1="24" y1="65" x2="104" y2="65"/>
    <line x1="24" y1="80" x2="104" y2="80"/>
    <line x1="24" y1="95" x2="104" y2="95"/>
  </g>
  <!-- Bar 1 -->
  <rect x="28" y="75" width="14" height="25" rx="2" fill="url(#ag1)" filter="url(#ashadow)"/>
  <!-- Bar 2 -->
  <rect x="48" y="55" width="14" height="45" rx="2" fill="url(#ag2)" filter="url(#ashadow)"/>
  <!-- Bar 3 -->
  <rect x="68" y="40" width="14" height="60" rx="2" fill="url(#ag3)" filter="url(#ashadow)"/>
  <!-- Bar 4 -->
  <rect x="88" y="30" width="14" height="70" rx="2" fill="url(#ag1)" filter="url(#ashadow)"/>
  <!-- Trend line -->
  <polyline points="35,72 55,52 75,37 95,27" fill="none" stroke="#6ee7b7" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Arrow tip -->
  <polygon points="95,27 90,32 98,32" fill="#6ee7b7"/>
  <!-- Sparkle -->
  <circle cx="100" cy="22" r="3" fill="#6ee7b7" opacity="0.8"/>
</svg>
