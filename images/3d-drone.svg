<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="dronebg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="dronebody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#475569"/>
      <stop offset="50%" style="stop-color:#64748b"/>
      <stop offset="100%" style="stop-color:#334155"/>
    </linearGradient>
    <linearGradient id="propellor" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#94a3b8"/>
      <stop offset="100%" style="stop-color:#64748b"/>
    </linearGradient>
    <linearGradient id="ledgreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
    <linearGradient id="ledred" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f87171"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <linearGradient id="camgrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <filter id="droneshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#334155" flood-opacity="0.5"/>
    </filter>
    <filter id="ledglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" rx="20" fill="url(#dronebg)" opacity="0.2"/>
  <!-- Arms -->
  <g filter="url(#droneshadow)">
    <!-- Left arm -->
    <line x1="85" y1="95" x2="40" y2="70" stroke="url(#dronebody)" stroke-width="6" stroke-linecap="round"/>
    <!-- Right arm -->
    <line x1="115" y1="95" x2="160" y2="70" stroke="url(#dronebody)" stroke-width="6" stroke-linecap="round"/>
    <!-- Rear left arm -->
    <line x1="88" y1="105" x2="45" y2="130" stroke="url(#dronebody)" stroke-width="5" stroke-linecap="round"/>
    <!-- Rear right arm -->
    <line x1="112" y1="105" x2="155" y2="130" stroke="url(#dronebody)" stroke-width="5" stroke-linecap="round"/>
  </g>
  <!-- Propeller 1 (front left) -->
  <g filter="url(#ledglow)">
    <circle cx="38" cy="68" r="18" fill="url(#propellor)" opacity="0.3"/>
    <line x1="25" y1="68" x2="51" y2="68" stroke="#94a3b8" stroke-width="3" opacity="0.7"/>
    <line x1="38" y1="55" x2="38" y2="81" stroke="#94a3b8" stroke-width="3" opacity="0.7"/>
    <circle cx="38" cy="68" r="4" fill="#475569"/>
  </g>
  <!-- Propeller 2 (front right) -->
  <g filter="url(#ledglow)">
    <circle cx="162" cy="68" r="18" fill="url(#propellor)" opacity="0.3"/>
    <line x1="149" y1="68" x2="175" y2="68" stroke="#94a3b8" stroke-width="3" opacity="0.7"/>
    <line x1="162" y1="55" x2="162" y2="81" stroke="#94a3b8" stroke-width="3" opacity="0.7"/>
    <circle cx="162" cy="68" r="4" fill="#475569"/>
  </g>
  <!-- Propeller 3 (rear left) -->
  <g filter="url(#ledglow)">
    <circle cx="43" cy="132" r="15" fill="url(#propellor)" opacity="0.25"/>
    <line x1="32" y1="132" x2="54" y2="132" stroke="#94a3b8" stroke-width="2.5" opacity="0.6"/>
    <line x1="43" y1="121" x2="43" y2="143" stroke="#94a3b8" stroke-width="2.5" opacity="0.6"/>
    <circle cx="43" cy="132" r="3.5" fill="#475569"/>
  </g>
  <!-- Propeller 4 (rear right) -->
  <g filter="url(#ledglow)">
    <circle cx="157" cy="132" r="15" fill="url(#propellor)" opacity="0.25"/>
    <line x1="146" y1="132" x2="168" y2="132" stroke="#94a3b8" stroke-width="2.5" opacity="0.6"/>
    <line x1="157" y1="121" x2="157" y2="143" stroke="#94a3b8" stroke-width="2.5" opacity="0.6"/>
    <circle cx="157" cy="132" r="3.5" fill="#475569"/>
  </g>
  <!-- Central body -->
  <rect x="75" y="88" width="50" height="30" rx="10" fill="url(#dronebody)" filter="url(#droneshadow)"/>
  <!-- LED indicators -->
  <circle cx="82" cy="95" r="3" fill="url(#ledgreen)" filter="url(#ledglow)"/>
  <circle cx="118" cy="95" r="3" fill="url(#ledred)" filter="url(#ledglow)"/>
  <!-- Camera gimbal -->
  <rect x="90" y="118" width="20" height="12" rx="4" fill="#334155"/>
  <circle cx="100" cy="124" r="5" fill="url(#camgrad2)" filter="url(#ledglow)"/>
  <circle cx="100" cy="124" r="2.5" fill="#0f172a" opacity="0.6"/>
  <!-- Landing gear -->
  <line x1="82" y1="118" x2="78" y2="132" stroke="#475569" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="118" y1="118" x2="122" y2="132" stroke="#475569" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="72" y1="132" x2="88" y2="132" stroke="#475569" stroke-width="2" stroke-linecap="round"/>
  <line x1="112" y1="132" x2="128" y2="132" stroke="#475569" stroke-width="2" stroke-linecap="round"/>
</svg>
