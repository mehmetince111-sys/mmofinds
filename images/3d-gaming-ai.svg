<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="gamebg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#2d1b4e"/>
    </linearGradient>
    <linearGradient id="controller" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#374151"/>
      <stop offset="50%" style="stop-color:#4b5563"/>
      <stop offset="100%" style="stop-color:#1f2937"/>
    </linearGradient>
    <linearGradient id="btn1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a9eff"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="btn2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <linearGradient id="btn3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <linearGradient id="btn4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eab308"/>
      <stop offset="100%" style="stop-color:#ca8a04"/>
    </linearGradient>
    <filter id="gameshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#8b5cf6" flood-opacity="0.4"/>
    </filter>
    <filter id="gameglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" rx="20" fill="url(#gamebg)" opacity="0.2"/>
  <!-- Game controller body -->
  <g filter="url(#gameshadow)">
    <path d="M40 80 Q40 60 60 60 L140 60 Q160 60 160 80 L165 120 Q168 140 155 145 L140 150 Q130 153 125 145 L115 130 Q100 125 85 130 L75 145 Q70 153 60 150 L45 145 Q32 140 35 120 Z" fill="url(#controller)"/>
  </g>
  <!-- D-pad -->
  <rect x="60" y="85" width="24" height="8" rx="2" fill="#1f2937"/>
  <rect x="68" y="77" width="8" height="24" rx="2" fill="#1f2937"/>
  <!-- Action buttons -->
  <circle cx="135" cy="85" r="5" fill="url(#btn1)" filter="url(#gameglow)"/>
  <circle cx="148" cy="98" r="5" fill="url(#btn2)" filter="url(#gameglow)"/>
  <circle cx="122" cy="98" r="5" fill="url(#btn3)" filter="url(#gameglow)"/>
  <circle cx="135" cy="111" r="5" fill="url(#btn4)" filter="url(#gameglow)"/>
  <!-- Center button -->
  <circle cx="100" cy="95" r="4" fill="#6366f1" filter="url(#gameglow)"/>
  <!-- AI indicator -->
  <text x="100" y="120" text-anchor="middle" font-family="monospace" font-size="8" fill="#a78bfa" opacity="0.7">AI</text>
  <!-- Shoulder buttons -->
  <rect x="55" y="65" width="20" height="6" rx="3" fill="#374151" opacity="0.7"/>
  <rect x="125" y="65" width="20" height="6" rx="3" fill="#374151" opacity="0.7"/>
  <!-- Joystick left -->
  <circle cx="75" cy="115" r="8" fill="#1f2937" stroke="#4b5563" stroke-width="1"/>
  <circle cx="75" cy="115" r="4" fill="#374151"/>
  <!-- Joystick right -->
  <circle cx="125" cy="115" r="8" fill="#1f2937" stroke="#4b5563" stroke-width="1"/>
  <circle cx="125" cy="115" r="4" fill="#374151"/>
  <!-- Game particles -->
  <circle cx="30" cy="50" r="2" fill="#8b5cf6" opacity="0.4"/>
  <circle cx="170" cy="40" r="1.5" fill="#ec4899" opacity="0.3"/>
  <circle cx="20" cy="150" r="1" fill="#4a9eff" opacity="0.3"/>
  <circle cx="180" cy="145" r="2" fill="#22c55e" opacity="0.3"/>
</svg>
