<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#667eea" flood-opacity="0.4"/>
    </filter>
    <filter id="glow1" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background sphere -->
  <circle cx="100" cy="100" r="75" fill="url(#grad1)" filter="url(#shadow1)" opacity="0.15"/>
  <circle cx="100" cy="100" r="65" fill="url(#grad1)" opacity="0.2"/>
  
  <!-- Central AI brain core -->
  <circle cx="100" cy="95" r="28" fill="url(#grad1)" filter="url(#shadow1)"/>
  <circle cx="100" cy="95" r="22" fill="none" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <circle cx="100" cy="95" r="14" fill="url(#grad2)" opacity="0.9"/>
  
  <!-- Neural network connections - top -->
  <line x1="100" y1="67" x2="100" y2="40" stroke="url(#grad3)" stroke-width="2" opacity="0.7"/>
  <circle cx="100" cy="35" r="8" fill="url(#grad3)" filter="url(#glow1)"/>
  <circle cx="100" cy="35" r="4" fill="white" opacity="0.8"/>
  
  <!-- Neural network connections - left -->
  <line x1="72" y1="95" x2="45" y2="90" stroke="url(#grad3)" stroke-width="2" opacity="0.7"/>
  <circle cx="40" cy="88" r="8" fill="url(#grad3)" filter="url(#glow1)"/>
  <circle cx="40" cy="88" r="4" fill="white" opacity="0.8"/>
  
  <!-- Neural network connections - right -->
  <line x1="128" y1="95" x2="155" y2="90" stroke="url(#grad3)" stroke-width="2" opacity="0.7"/>
  <circle cx="160" cy="88" r="8" fill="url(#grad3)" filter="url(#glow1)"/>
  <circle cx="160" cy="88" r="4" fill="white" opacity="0.8"/>
  
  <!-- Neural network connections - bottom-left -->
  <line x1="82" y1="115" x2="55" y2="140" stroke="url(#grad2)" stroke-width="2" opacity="0.7"/>
  <circle cx="50" cy="145" r="7" fill="url(#grad2)" filter="url(#glow1)"/>
  <circle cx="50" cy="145" r="3.5" fill="white" opacity="0.8"/>
  
  <!-- Neural network connections - bottom-right -->
  <line x1="118" y1="115" x2="145" y2="140" stroke="url(#grad2)" stroke-width="2" opacity="0.7"/>
  <circle cx="150" cy="145" r="7" fill="url(#grad2)" filter="url(#glow1)"/>
  <circle cx="150" cy="145" r="3.5" fill="white" opacity="0.8"/>
  
  <!-- Neural network connections - top-left -->
  <line x1="82" y1="78" x2="55" y2="55" stroke="url(#grad1)" stroke-width="1.5" opacity="0.5"/>
  <circle cx="50" cy="50" r="5" fill="url(#grad1)" filter="url(#glow1)"/>
  
  <!-- Neural network connections - top-right -->
  <line x1="118" y1="78" x2="145" y2="55" stroke="url(#grad1)" stroke-width="1.5" opacity="0.5"/>
  <circle cx="150" cy="50" r="5" fill="url(#grad1)" filter="url(#glow1)"/>
  
  <!-- Inner brain pattern - hexagonal grid -->
  <polygon points="100,85 108,90 108,100 100,105 92,100 92,90" fill="none" stroke="white" stroke-width="1" opacity="0.4"/>
  <polygon points="100,90 106,93 106,100 100,103 94,100 94,93" fill="white" opacity="0.3"/>
  
  <!-- Floating particles -->
  <circle cx="75" cy="60" r="2" fill="white" opacity="0.6"/>
  <circle cx="130" cy="55" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="60" cy="120" r="2" fill="url(#grad3)" opacity="0.5"/>
  <circle cx="140" cy="115" r="1.5" fill="url(#grad2)" opacity="0.5"/>
  <circle cx="90" cy="140" r="1" fill="white" opacity="0.3"/>
  <circle cx="115" cy="135" r="1.5" fill="white" opacity="0.4"/>
  
  <!-- Outer ring -->
  <circle cx="100" cy="95" r="70" fill="none" stroke="url(#grad1)" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.3"/>
  <circle cx="100" cy="95" r="78" fill="none" stroke="url(#grad3)" stroke-width="0.3" stroke-dasharray="2 6" opacity="0.2"/>
</svg>
