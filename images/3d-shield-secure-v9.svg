<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38f9d7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldInner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <filter id="shieldShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#43e97b" flood-opacity="0.4"/>
    </filter>
    <filter id="shieldGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background glow -->
  <circle cx="100" cy="100" r="80" fill="url(#shieldGrad)" opacity="0.1" filter="url(#shieldShadow)"/>
  
  <!-- Shield outer shape -->
  <path d="M 100 25 L 155 45 L 155 100 C 155 140 120 170 100 180 C 80 170 45 140 45 100 L 45 45 Z" 
        fill="url(#shieldGrad)" filter="url(#shieldShadow)" opacity="0.9"/>
  
  <!-- Shield inner shape -->
  <path d="M 100 35 L 145 52 L 145 100 C 145 135 115 160 100 170 C 85 160 55 135 55 100 L 55 52 Z" 
        fill="url(#shieldInner)" opacity="0.3"/>
  
  <!-- Shield highlight -->
  <path d="M 100 35 L 145 52 L 145 100 C 145 135 115 160 100 170 C 85 160 55 135 55 100 L 55 52 Z" 
        fill="none" stroke="white" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Checkmark -->
  <path d="M 75 105 L 92 122 L 128 82" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" filter="url(#shieldGlow)"/>
  
  <!-- Inner glow circle -->
  <circle cx="100" cy="100" r="50" fill="url(#shieldGrad)" opacity="0.15"/>
  <circle cx="100" cy="100" r="40" fill="url(#shieldGrad)" opacity="0.1"/>
  
  <!-- Security dots -->
  <circle cx="70" cy="70" r="3" fill="white" opacity="0.5"/>
  <circle cx="130" cy="70" r="3" fill="white" opacity="0.5"/>
  <circle cx="80" cy="135" r="2.5" fill="white" opacity="0.4"/>
  <circle cx="120" cy="135" r="2.5" fill="white" opacity="0.4"/>
  
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="url(#shieldGrad)" stroke-width="0.5" stroke-dasharray="3 5" opacity="0.3"/>
</svg>
