<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="robotbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="robotbody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <linearGradient id="robothead" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="eye1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
    <linearGradient id="antennag" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <filter id="robotshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#6366f1" flood-opacity="0.4"/>
    </filter>
    <filter id="eyeglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="coregrad" cx="45%" cy="40%" r="55%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </radialGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#robotbg)" opacity="0.3"/>
  <!-- Antenna -->
  <g filter="url(#robotshadow)">
    <line x1="100" y1="40" x2="100" y2="60" stroke="url(#antennag)" stroke-width="3" stroke-linecap="round"/>
    <circle cx="100" cy="38" r="6" fill="url(#antennag)" filter="url(#eyeglow)"/>
  </g>
  <!-- Head -->
  <rect x="65" y="55" width="70" height="50" rx="15" fill="url(#robothead)" filter="url(#robotshadow)"/>
  <!-- Eyes -->
  <g filter="url(#eyeglow)">
    <circle cx="85" cy="75" r="8" fill="url(#eye1)" opacity="0.9"/>
    <circle cx="115" cy="75" r="8" fill="url(#eye1)" opacity="0.9"/>
    <circle cx="87" cy="73" r="3" fill="#fff" opacity="0.5"/>
    <circle cx="117" cy="73" r="3" fill="#fff" opacity="0.5"/>
  </g>
  <!-- Mouth -->
  <rect x="85" y="88" width="30" height="4" rx="2" fill="#312e81" opacity="0.6"/>
  <!-- Neck -->
  <rect x="90" y="105" width="20" height="8" rx="3" fill="#4f46e5" opacity="0.7"/>
  <!-- Body -->
  <rect x="55" y="113" width="90" height="55" rx="15" fill="url(#robotbody)" filter="url(#robotshadow)"/>
  <!-- AI Core -->
  <circle cx="100" cy="138" r="15" fill="url(#coregrad)" filter="url(#eyeglow)"/>
  <circle cx="100" cy="138" r="8" fill="#1e1b4b" opacity="0.5"/>
  <circle cx="100" cy="138" r="3" fill="#c7d2fe" opacity="0.8"/>
  <!-- Arms -->
  <rect x="35" y="120" width="18" height="35" rx="8" fill="url(#robotbody)" opacity="0.8"/>
  <rect x="147" y="120" width="18" height="35" rx="8" fill="url(#robotbody)" opacity="0.8"/>
  <!-- Hands -->
  <circle cx="44" cy="158" r="8" fill="#6366f1" opacity="0.7"/>
  <circle cx="156" cy="158" r="8" fill="#6366f1" opacity="0.7"/>
  <!-- Circuit lines on body -->
  <path d="M65 125 L80 125" stroke="#a5b4fc" stroke-width="1" opacity="0.4"/>
  <path d="M120 125 L135 125" stroke="#a5b4fc" stroke-width="1" opacity="0.4"/>
  <path d="M70 150 L85 150" stroke="#a5b4fc" stroke-width="1" opacity="0.3"/>
  <path d="M115 150 L130 150" stroke="#a5b4fc" stroke-width="1" opacity="0.3"/>
</svg>
