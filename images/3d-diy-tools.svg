<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="diyGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <linearGradient id="wrenchGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="gearGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9ca3af"/>
      <stop offset="100%" style="stop-color:#6b7280"/>
    </linearGradient>
    <filter id="toolShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#22c55e" flood-opacity="0.3"/>
    </filter>
    <filter id="gearGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <circle cx="100" cy="100" r="90" fill="#22c55e" opacity="0.08"/>
  <circle cx="100" cy="100" r="70" fill="#22c55e" opacity="0.12"/>
  <!-- Gear (large, back) -->
  <g filter="url(#toolShadow)" transform="translate(130, 65)">
    <circle cx="0" cy="0" r="28" fill="url(#gearGrad)"/>
    <circle cx="0" cy="0" r="18" fill="#1a1a1a"/>
    <circle cx="0" cy="0" r="8" fill="url(#gearGrad)"/>
    <!-- Gear teeth -->
    <rect x="-6" y="-34" width="12" height="10" rx="3" fill="url(#gearGrad)"/>
    <rect x="-6" y="24" width="12" height="10" rx="3" fill="url(#gearGrad)"/>
    <rect x="-34" y="-6" width="10" height="12" rx="3" fill="url(#gearGrad)"/>
    <rect x="24" y="-6" width="10" height="12" rx="3" fill="url(#gearGrad)"/>
    <rect x="-6" y="-34" width="12" height="10" rx="3" fill="url(#gearGrad)" transform="rotate(45)"/>
    <rect x="-6" y="24" width="12" height="10" rx="3" fill="url(#gearGrad)" transform="rotate(45)"/>
    <rect x="-34" y="-6" width="10" height="12" rx="3" fill="url(#gearGrad)" transform="rotate(45)"/>
    <rect x="24" y="-6" width="10" height="12" rx="3" fill="url(#gearGrad)" transform="rotate(45)"/>
  </g>
  <!-- Wrench -->
  <g filter="url(#toolShadow)" transform="translate(70, 110) rotate(-35)">
    <!-- Handle -->
    <rect x="-6" y="-40" width="12" height="70" rx="4" fill="url(#wrenchGrad)"/>
    <!-- Handle grip lines -->
    <line x1="-4" y1="-25" x2="4" y2="-25" stroke="#d97706" stroke-width="1.5"/>
    <line x1="-4" y1="-15" x2="4" y2="-15" stroke="#d97706" stroke-width="1.5"/>
    <line x1="-4" y1="-5" x2="4" y2="-5" stroke="#d97706" stroke-width="1.5"/>
    <line x1="-4" y1="5" x2="4" y2="5" stroke="#d97706" stroke-width="1.5"/>
    <!-- Top head -->
    <circle cx="0" cy="-45" r="14" fill="url(#wrenchGrad)"/>
    <circle cx="0" cy="-45" r="8" fill="#1a1a1a"/>
    <!-- Bottom head -->
    <path d="M-12 30 L-12 42 A12 12 0 0 0 12 42 L12 30 L6 30 L6 38 A6 6 0 0 1 -6 38 L-6 30 Z" fill="url(#wrenchGrad)"/>
  </g>
  <!-- Screwdriver -->
  <g filter="url(#toolShadow)" transform="translate(100, 100) rotate(25)">
    <!-- Handle -->
    <rect x="-8" y="-10" width="16" height="45" rx="6" fill="url(#diyGrad1)"/>
    <!-- Handle grip -->
    <line x1="-6" y1="0" x2="6" y2="0" stroke="#15803d" stroke-width="2"/>
    <line x1="-6" y1="8" x2="6" y2="8" stroke="#15803d" stroke-width="2"/>
    <line x1="-6" y1="16" x2="6" y2="16" stroke="#15803d" stroke-width="2"/>
    <!-- Shaft -->
    <rect x="-3" y="-55" width="6" height="48" rx="2" fill="#d1d5db"/>
    <!-- Tip -->
    <polygon points="-3,-55 3,-55 0,-65" fill="#9ca3af"/>
  </g>
  <!-- Spark / star accents -->
  <g filter="url(#gearGlow)">
    <polygon points="50,40 53,48 62,48 55,53 58,62 50,56 42,62 45,53 38,48 47,48" fill="#fbbf24" opacity="0.8"/>
    <polygon points="155,140 157,145 162,145 158,148 160,153 155,150 150,153 152,148 148,145 153,145" fill="#4ade80" opacity="0.7"/>
  </g>
  <!-- 3D highlight on gear -->
  <circle cx="125" cy="60" r="12" fill="white" opacity="0.1"/>
</svg>