<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="globe1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a9eff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="globe2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6db3ff;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0.6" />
    </linearGradient>
    <filter id="globeShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#4a9eff" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Globe sphere -->
  <circle cx="64" cy="64" r="42" fill="url(#globe1)" filter="url(#globeShadow)"/>
  <!-- Latitude lines -->
  <ellipse cx="64" cy="64" rx="42" ry="14" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <ellipse cx="64" cy="64" rx="42" ry="28" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <line x1="64" y1="22" x2="64" y2="106" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <ellipse cx="64" cy="64" rx="20" ry="42" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <!-- Connection nodes -->
  <circle cx="38" cy="45" r="4" fill="white" opacity="0.9"/>
  <circle cx="82" cy="55" r="4" fill="white" opacity="0.9"/>
  <circle cx="55" cy="82" r="4" fill="white" opacity="0.9"/>
  <circle cx="75" cy="38" r="3" fill="white" opacity="0.7"/>
  <!-- Connection lines -->
  <line x1="38" y1="45" x2="82" y2="55" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <line x1="82" y1="55" x2="55" y2="82" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <line x1="55" y1="82" x2="38" y2="45" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <line x1="38" y1="45" x2="75" y2="38" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <line x1="82" y1="55" x2="75" y2="38" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  <!-- Highlight -->
  <ellipse cx="52" cy="48" rx="12" ry="8" fill="rgba(255,255,255,0.15)" transform="rotate(-30 52 48)"/>
</svg>
