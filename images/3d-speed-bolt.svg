<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="speed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="speed-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#ec4899" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background glow -->
  <circle cx="64" cy="64" r="48" fill="url(#speed)" opacity="0.1"/>
  
  <!-- Lightning bolt -->
  <path d="M72 12 L40 60 L58 60 L48 116 L88 52 L68 52 Z" 
        fill="url(#speed)" filter="url(#speed-shadow)"/>
  
  <!-- Inner highlight -->
  <path d="M68 20 L46 56 L56 56 L50 100 L78 56 L66 56 Z" 
        fill="rgba(255,255,255,0.2)"/>
  
  <!-- Speed lines -->
  <line x1="16" y1="40" x2="32" y2="40" stroke="url(#speed)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="12" y1="56" x2="28" y2="56" stroke="url(#speed)" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="14" y1="72" x2="30" y2="72" stroke="url(#speed)" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="96" y1="36" x2="112" y2="36" stroke="url(#speed)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="100" y1="52" x2="116" y2="52" stroke="url(#speed)" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
</svg>
