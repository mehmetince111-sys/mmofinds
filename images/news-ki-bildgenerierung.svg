<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2332;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1923;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a5f;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg)" rx="12"/>
  <circle cx="650" cy="80" r="120" fill="#ec4899" opacity="0.06"/>
  <circle cx="700" cy="400" r="80" fill="#ec4899" opacity="0.04"/>
  <g transform="translate(40, 50)">
    <rect width="100" height="100" rx="20" fill="#ec4899" opacity="0.15"/>
    <text x="50" y="65" text-anchor="middle" font-size="50">🎨</text>
  </g>
  <text x="160" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#ffffff">KI-Bildgenerierung</text>
  <rect x="40" y="380" width="100" height="30" rx="15" fill="#ec4899" opacity="0.2"/>
  <text x="90" y="400" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#ec4899" text-transform="uppercase">BILD</text>
</svg>