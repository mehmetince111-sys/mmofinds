<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="shieldbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="shieldgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="50%" style="stop-color:#16a34a"/>
      <stop offset="100%" style="stop-color:#15803d"/>
    </linearGradient>
    <linearGradient id="shieldinner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <filter id="shieldshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#22c55e" flood-opacity="0.4"/>
    </filter>
    <filter id="shieldglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" rx="20" fill="url(#shieldbg)" opacity="0.2"/>
  <!-- Shield shape -->
  <g filter="url(#shieldshadow)">
    <path d="M100 25 L155 45 L155 100 Q155 145 100 175 Q45 145 45 100 L45 45 Z" fill="url(#shieldgrad)" opacity="0.9"/>
    <path d="M100 35 L147 52 L147 98 Q147 138 100 165 Q53 138 53 98 L53 52 Z" fill="url(#shieldinner)" opacity="0.8"/>
  </g>
  <!-- Lock icon -->
  <g filter="url(#shieldglow)">
    <rect x="85" y="90" width="30" height="24" rx="4" fill="#fff" opacity="0.9"/>
    <path d="M90 90 L90 80 Q90 72 100 72 Q110 72 110 80 L110 90" stroke="#fff" stroke-width="4" fill="none" opacity="0.9"/>
    <circle cx="100" cy="100" r="3" fill="#16a34a"/>
    <rect x="99" y="102" width="2" height="8" rx="1" fill="#16a34a"/>
  </g>
  <!-- Checkmark -->
  <path d="M85 118 L95 128 L115 108" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  <!-- Circuit lines -->
  <path d="M45 70 L35 70 L35 90" stroke="#22c55e" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M155 70 L165 70 L165 90" stroke="#22c55e" stroke-width="1.5" fill="none" opacity="0.4"/>
  <circle cx="35" cy="90" r="2" fill="#22c55e" opacity="0.5"/>
  <circle cx="165" cy="90" r="2" fill="#22c55e" opacity="0.5"/>
</svg>
