<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="community" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a9eff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1" />
    </linearGradient>
    <filter id="community-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#4a9eff" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background glow -->
  <circle cx="64" cy="64" r="48" fill="url(#community)" opacity="0.1"/>
  
  <!-- Center person -->
  <circle cx="64" cy="40" r="12" fill="url(#community)" filter="url(#community-shadow)"/>
  <path d="M40 92 C40 72 52 64 64 64 C76 64 88 72 88 92" fill="url(#community)" filter="url(#community-shadow)"/>
  
  <!-- Left person -->
  <circle cx="30" cy="52" r="8" fill="url(#community)" opacity="0.7"/>
  <path d="M16 86 C16 72 24 66 30 66 C36 66 44 72 44 86" fill="url(#community)" opacity="0.7"/>
  
  <!-- Right person -->
  <circle cx="98" cy="52" r="8" fill="url(#community)" opacity="0.7"/>
  <path d="M84 86 C84 72 92 66 98 66 C104 66 112 72 112 86" fill="url(#community)" opacity="0.7"/>
  
  <!-- Connection lines -->
  <line x1="42" y1="52" x2="56" y2="44" stroke="url(#community)" stroke-width="1.5" opacity="0.3" stroke-dasharray="3,3"/>
  <line x1="86" y1="52" x2="72" y2="44" stroke="url(#community)" stroke-width="1.5" opacity="0.3" stroke-dasharray="3,3"/>
</svg>
