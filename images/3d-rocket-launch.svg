<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="rocket" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    <filter id="rocket-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#f59e0b" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background glow -->
  <circle cx="64" cy="64" r="48" fill="url(#rocket)" opacity="0.1"/>
  
  <!-- Rocket body -->
  <path d="M64 16 C64 16 52 36 52 60 L52 80 L76 80 L76 60 C76 36 64 16 64 16Z" 
        fill="url(#rocket)" filter="url(#rocket-shadow)"/>
  
  <!-- Rocket window -->
  <circle cx="64" cy="48" r="8" fill="rgba(255,255,255,0.9)"/>
  <circle cx="64" cy="48" r="5" fill="url(#rocket)"/>
  
  <!-- Rocket fins -->
  <path d="M52 72 L40 88 L52 80Z" fill="url(#rocket)" filter="url(#rocket-shadow)"/>
  <path d="M76 72 L88 88 L76 80Z" fill="url(#rocket)" filter="url(#rocket-shadow)"/>
  
  <!-- Flame -->
  <path d="M56 80 L64 104 L72 80Z" fill="#f59e0b" opacity="0.8"/>
  <path d="M60 80 L64 96 L68 80Z" fill="#ec4899" opacity="0.6"/>
  
  <!-- Stars -->
  <circle cx="24" cy="32" r="2" fill="#f59e0b" opacity="0.6"/>
  <circle cx="100" cy="28" r="1.5" fill="#ec4899" opacity="0.5"/>
  <circle cx="96" cy="72" r="2" fill="#f59e0b" opacity="0.4"/>
  <circle cx="28" cy="80" r="1.5" fill="#ec4899" opacity="0.5"/>
</svg>
