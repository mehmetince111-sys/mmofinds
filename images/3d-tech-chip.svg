<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="chipBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="chipCore" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a9eff"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="pinGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c0c0c0"/>
      <stop offset="100%" style="stop-color:#808080"/>
    </linearGradient>
    <filter id="chipShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#4a9eff" flood-opacity="0.4"/>
    </filter>
    <filter id="coreGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="coreHighlight" cx="40%" cy="35%" r="60%">
      <stop offset="0%" style="stop-color:#a5b4fc"/>
      <stop offset="100%" style="stop-color:#4a9eff"/>
    </radialGradient>
  </defs>
  <!-- Background glow -->
  <circle cx="100" cy="100" r="90" fill="#4a9eff" opacity="0.05"/>
  <!-- Pins top -->
  <g fill="url(#pinGrad)">
    <rect x="60" y="20" width="8" height="18" rx="2"/>
    <rect x="75" y="20" width="8" height="18" rx="2"/>
    <rect x="90" y="20" width="8" height="18" rx="2"/>
    <rect x="105" y="20" width="8" height="18" rx="2"/>
    <rect x="120" y="20" width="8" height="18" rx="2"/>
  </g>
  <!-- Pins bottom -->
  <g fill="url(#pinGrad)">
    <rect x="60" y="162" width="8" height="18" rx="2"/>
    <rect x="75" y="162" width="8" height="18" rx="2"/>
    <rect x="90" y="162" width="8" height="18" rx="2"/>
    <rect x="105" y="162" width="8" height="18" rx="2"/>
    <rect x="120" y="162" width="8" height="18" rx="2"/>
  </g>
  <!-- Pins left -->
  <g fill="url(#pinGrad)">
    <rect x="20" y="60" width="18" height="8" rx="2"/>
    <rect x="20" y="75" width="18" height="8" rx="2"/>
    <rect x="20" y="90" width="18" height="8" rx="2"/>
    <rect x="20" y="105" width="18" height="8" rx="2"/>
    <rect x="20" y="120" width="18" height="8" rx="2"/>
  </g>
  <!-- Pins right -->
  <g fill="url(#pinGrad)">
    <rect x="162" y="60" width="18" height="8" rx="2"/>
    <rect x="162" y="75" width="18" height="8" rx="2"/>
    <rect x="162" y="90" width="18" height="8" rx="2"/>
    <rect x="162" y="105" width="18" height="8" rx="2"/>
    <rect x="162" y="120" width="18" height="8" rx="2"/>
  </g>
  <!-- Chip body with shadow -->
  <g filter="url(#chipShadow)">
    <rect x="38" y="38" width="124" height="124" rx="12" fill="url(#chipBody)" stroke="#2a2a4a" stroke-width="2"/>
  </g>
  <!-- Chip inner border -->
  <rect x="44" y="44" width="112" height="112" rx="8" fill="none" stroke="#3a3a5a" stroke-width="1"/>
  <!-- Core with glow -->
  <g filter="url(#coreGlow)">
    <rect x="65" y="65" width="70" height="70" rx="10" fill="url(#chipCore)"/>
  </g>
  <!-- Core highlight -->
  <rect x="67" y="67" width="66" height="66" rx="8" fill="url(#coreHighlight)" opacity="0.3"/>
  <!-- Circuit traces -->
  <g stroke="#4a9eff" stroke-width="1.5" fill="none" opacity="0.6">
    <path d="M65 80 L55 80 L55 55"/>
    <path d="M135 80 L145 80 L145 55"/>
    <path d="M65 120 L55 120 L55 145"/>
    <path d="M135 120 L145 120 L145 145"/>
    <path d="M80 65 L80 55"/>
    <path d="M120 65 L120 55"/>
    <path d="M80 135 L80 145"/>
    <path d="M120 135 L120 145"/>
    <path d="M100 65 L100 55"/>
    <path d="M100 135 L100 145"/>
  </g>
  <!-- Core pattern -->
  <g fill="white" opacity="0.15">
    <rect x="80" y="80" width="12" height="12" rx="2"/>
    <rect x="108" y="80" width="12" height="12" rx="2"/>
    <rect x="80" y="108" width="12" height="12" rx="2"/>
    <rect x="108" y="108" width="12" height="12" rx="2"/>
  </g>
  <!-- Center dot -->
  <circle cx="100" cy="100" r="8" fill="white" opacity="0.4"/>
  <circle cx="100" cy="100" r="4" fill="white" opacity="0.7"/>
  <!-- AI symbol -->
  <text x="100" y="105" text-anchor="middle" fill="white" font-size="14" font-weight="bold" opacity="0.9">AI</text>
</svg>