<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="videobg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="playgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a9eff"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="camgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <filter id="videoshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#4a9eff" flood-opacity="0.4"/>
    </filter>
    <filter id="playglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="lensgrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" style="stop-color:#93c5fd"/>
      <stop offset="50%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" rx="20" fill="url(#videobg)" opacity="0.3"/>
  <!-- Camera body -->
  <g filter="url(#videoshadow)">
    <rect x="45" y="65" width="110" height="70" rx="12" fill="url(#camgrad)" opacity="0.9"/>
    <rect x="50" y="70" width="100" height="60" rx="10" fill="#1e293b" opacity="0.8"/>
  </g>
  <!-- Lens -->
  <circle cx="100" cy="100" r="22" fill="url(#lensgrad)" filter="url(#playglow)"/>
  <circle cx="100" cy="100" r="14" fill="#0f172a" opacity="0.7"/>
  <circle cx="100" cy="100" r="7" fill="#1e293b"/>
  <circle cx="95" cy="95" r="3" fill="#fff" opacity="0.3"/>
  <!-- Recording dot -->
  <circle cx="145" cy="75" r="5" fill="#ef4444" filter="url(#playglow)"/>
  <!-- Play button overlay -->
  <g filter="url(#playglow)">
    <circle cx="100" cy="100" r="30" fill="url(#playgrad)" opacity="0.85"/>
    <polygon points="92,86 114,100 92,114" fill="#fff" opacity="0.95"/>
  </g>
  <!-- Film strip accents -->
  <rect x="20" y="80" width="15" height="40" rx="3" fill="#334155" opacity="0.5"/>
  <rect x="165" y="80" width="15" height="40" rx="3" fill="#334155" opacity="0.5"/>
  <circle cx="27" cy="86" r="2" fill="#475569" opacity="0.6"/>
  <circle cx="27" cy="94" r="2" fill="#475569" opacity="0.6"/>
  <circle cx="27" cy="102" r="2" fill="#475569" opacity="0.6"/>
  <circle cx="27" cy="110" r="2" fill="#475569" opacity="0.6"/>
  <circle cx="27" cy="118" r="2" fill="#475569" opacity="0.6"/>
  <circle cx="172" cy="86" r="2" fill="#475569" opacity="0.6"/>
  <circle cx="172" cy="94" r="2" fill="#475569" opacity="0.6"/>
  <circle cx="172" cy="102" r="2" fill="#475569" opacity="0.6"/>
  <circle cx="172" cy="110" r="2" fill="#475569" opacity="0.6"/>
  <circle cx="172" cy="118" r="2" fill="#475569" opacity="0.6"/>
</svg>
