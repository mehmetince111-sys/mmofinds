<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a9eff;stop-opacity:1" />
    </linearGradient>
    <filter id="shield-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#22c55e" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background glow -->
  <circle cx="64" cy="64" r="48" fill="url(#shield)" opacity="0.1"/>
  
  <!-- Shield shape -->
  <path d="M64 12 L100 28 L100 60 C100 84 80 104 64 116 C48 104 28 84 28 60 L28 28 Z" 
        fill="url(#shield)" filter="url(#shield-shadow)"/>
  
  <!-- Shield inner -->
  <path d="M64 22 L90 34 L90 58 C90 78 74 94 64 104 C54 94 38 78 38 58 L38 34 Z" 
        fill="rgba(255,255,255,0.15)"/>
  
  <!-- Check mark -->
  <path d="M48 62 L58 72 L80 48" fill="none" stroke="white" stroke-width="5" 
        stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Sparkles -->
  <circle cx="20" cy="20" r="2" fill="#22c55e" opacity="0.5"/>
  <circle cx="108" cy="18" r="1.5" fill="#4a9eff" opacity="0.5"/>
  <circle cx="112" cy="90" r="2" fill="#22c55e" opacity="0.4"/>
</svg>
