<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="reviewGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fde68a"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <filter id="starShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#f59e0b" flood-opacity="0.4"/>
    </filter>
    <filter id="starGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <circle cx="100" cy="100" r="90" fill="#f59e0b" opacity="0.08"/>
  <circle cx="100" cy="100" r="70" fill="#f59e0b" opacity="0.12"/>
  <!-- Star 1 (large, center) -->
  <g filter="url(#starShadow)" transform="translate(100, 90)">
    <polygon points="0,-35 8,-12 32,-12 13,3 20,28 0,14 -20,28 -13,3 -32,-12 -8,-12" fill="url(#starGrad)"/>
  </g>
  <!-- Star glow -->
  <g filter="url(#starGlow)">
    <polygon points="0,-35 8,-12 32,-12 13,3 20,28 0,14 -20,28 -13,3 -32,-12 -8,-12" fill="url(#starGrad)" opacity="0.3"/>
  </g>
  <!-- 5 small stars in arc -->
  <g>
    <polygon points="40,45 42,50 48,50 43,53 45,58 40,55 35,58 37,53 32,50 38,50" fill="#fde68a" opacity="0.7"/>
    <polygon points="60,35 62,40 68,40 63,43 65,48 60,45 55,48 57,43 52,40 58,40" fill="#fde68a" opacity="0.6"/>
    <polygon points="140,35 142,40 148,40 143,43 145,48 140,45 135,48 137,43 132,40 138,40" fill="#fde68a" opacity="0.6"/>
    <polygon points="160,45 162,50 168,50 163,53 165,58 160,55 155,58 157,53 152,50 158,50" fill="#fde68a" opacity="0.7"/>
    <polygon points="100,25 102,30 108,30 103,33 105,38 100,35 95,38 97,33 92,30 98,30" fill="#fde68a" opacity="0.5"/>
  </g>
  <!-- 3D highlight on main star -->
  <polygon points="0,-25 4,-8 18,-8 8,2 12,18 0,8 -12,18 -8,2 -18,-8 -4,-8" fill="white" opacity="0.15"/>
  <!-- Rating badge -->
  <g transform="translate(100, 155)">
    <rect x="-30" y="-14" width="60" height="28" rx="14" fill="url(#reviewGrad)"/>
    <text x="0" y="5" text-anchor="middle" fill="white" font-size="13" font-weight="bold">5.0 ★</text>
  </g>
  <!-- Check marks -->
  <g stroke="#22c55e" stroke-width="3" fill="none" opacity="0.7">
    <polyline points="30,145 35,150 45,138"/>
    <polyline points="155,145 160,150 170,138"/>
  </g>
</svg>