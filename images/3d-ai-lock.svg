<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="lock1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <filter id="lockShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#06b6d4" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Lock body -->
  <rect x="30" y="56" width="68" height="52" rx="10" fill="url(#lock1)" filter="url(#lockShadow)"/>
  <!-- Lock highlight -->
  <rect x="34" y="60" width="60" height="44" rx="7" fill="rgba(255,255,255,0.1)"/>
  <!-- Shackle -->
  <path d="M44 56 V40 C44 24 56 16 64 16 C72 16 84 24 84 40 V56" fill="none" stroke="url(#lock1)" stroke-width="8" stroke-linecap="round"/>
  <!-- Keyhole -->
  <circle cx="64" cy="76" r="8" fill="rgba(0,0,0,0.4)"/>
  <rect x="61" y="76" width="6" height="14" rx="2" fill="rgba(0,0,0,0.4)"/>
  <!-- Shield accent -->
  <path d="M30 60 L22 56 L22 96 L30 100 Z" fill="rgba(255,255,255,0.15)"/>
  <path d="M98 60 L106 56 L106 96 L98 100 Z" fill="rgba(255,255,255,0.15)"/>
  <!-- Checkmark -->
  <polyline points="56,76 62,82 74,68" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
</svg>
