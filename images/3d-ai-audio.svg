<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="wave1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
    </linearGradient>
    <filter id="waveShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#f97316" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Sound waves -->
  <path d="M20 64 C20 40 30 28 44 28 C58 28 64 44 64 64 C64 84 58 100 44 100 C30 100 20 88 20 64 Z" fill="url(#wave1)" filter="url(#waveShadow)"/>
  <path d="M36 64 C36 50 42 42 50 42 C58 42 64 52 64 64 C64 76 58 86 50 86 C42 86 36 78 36 64 Z" fill="rgba(255,255,255,0.15)"/>
  <!-- Wave lines -->
  <path d="M72 64 C72 48 80 36 92 36" fill="none" stroke="url(#wave1)" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <path d="M78 64 C78 52 86 44 98 44" fill="none" stroke="url(#wave1)" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <path d="M84 64 C84 56 92 50 104 50" fill="none" stroke="url(#wave1)" stroke-width="5" stroke-linecap="round" opacity="0.3"/>
  <!-- Center speaker dots -->
  <circle cx="50" cy="60" r="2" fill="white" opacity="0.8"/>
  <circle cx="50" cy="68" r="2" fill="white" opacity="0.6"/>
  <circle cx="50" cy="76" r="2" fill="white" opacity="0.4"/>
  <!-- Music note -->
  <ellipse cx="50" cy="52" rx="6" ry="4" fill="rgba(255,255,255,0.5)" transform="rotate(-15 50 52)"/>
  <rect x="54" y="36" width="3" height="18" rx="1" fill="rgba(255,255,255,0.5)"/>
  <path d="M57 36 C60 38 62 42 60 46" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
</svg>
