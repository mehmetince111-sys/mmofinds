<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a9eff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a9eff;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#4a9eff" flood-opacity="0.3"/>
    </filter>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#ec4899" flood-opacity="0.3"/>
    </filter>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#22c55e" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- AI Brain -->
  <circle cx="64" cy="64" r="48" fill="url(#g1)" filter="url(#shadow1)" opacity="0.15"/>
  <circle cx="64" cy="64" r="40" fill="none" stroke="url(#g1)" stroke-width="2" opacity="0.4"/>
  
  <!-- Neural network nodes -->
  <circle cx="64" cy="38" r="6" fill="url(#g1)" filter="url(#shadow1)"/>
  <circle cx="44" cy="56" r="5" fill="url(#g1)" filter="url(#shadow1)"/>
  <circle cx="84" cy="56" r="5" fill="url(#g1)" filter="url(#shadow1)"/>
  <circle cx="52" cy="78" r="5" fill="url(#g1)" filter="url(#shadow1)"/>
  <circle cx="76" cy="78" r="5" fill="url(#g1)" filter="url(#shadow1)"/>
  <circle cx="64" cy="92" r="4" fill="url(#g1)" filter="url(#shadow1)"/>
  
  <!-- Connections -->
  <line x1="64" y1="38" x2="44" y2="56" stroke="url(#g1)" stroke-width="1.5" opacity="0.5"/>
  <line x1="64" y1="38" x2="84" y2="56" stroke="url(#g1)" stroke-width="1.5" opacity="0.5"/>
  <line x1="44" y1="56" x2="52" y2="78" stroke="url(#g1)" stroke-width="1.5" opacity="0.5"/>
  <line x1="84" y1="56" x2="76" y2="78" stroke="url(#g1)" stroke-width="1.5" opacity="0.5"/>
  <line x1="52" y1="78" x2="64" y2="92" stroke="url(#g1)" stroke-width="1.5" opacity="0.5"/>
  <line x1="76" y1="78" x2="64" y2="92" stroke="url(#g1)" stroke-width="1.5" opacity="0.5"/>
  <line x1="44" y1="56" x2="76" y2="78" stroke="url(#g1)" stroke-width="1" opacity="0.3"/>
  <line x1="84" y1="56" x2="52" y2="78" stroke="url(#g1)" stroke-width="1" opacity="0.3"/>
</svg>
