<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="speedGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f5576c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff9a56;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="meterGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00f2fe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#43e97b;stop-opacity:1" />
    </linearGradient>
    <filter id="speedShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#f5576c" flood-opacity="0.4"/>
    </filter>
    <filter id="speedGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="80" fill="url(#speedGrad)" opacity="0.1" filter="url(#speedShadow)"/>
  <circle cx="100" cy="100" r="70" fill="url(#speedGrad)" opacity="0.08"/>
  
  <!-- Speedometer arc background -->
  <path d="M 40 120 A 60 60 0 0 1 160 120" fill="none" stroke="#333" stroke-width="8" stroke-linecap="round" opacity="0.2"/>
  
  <!-- Speedometer arc filled -->
  <path d="M 40 120 A 60 60 0 0 1 140 70" fill="none" stroke="url(#speedGrad)" stroke-width="8" stroke-linecap="round" filter="url(#speedGlow)"/>
  
  <!-- Speedometer ticks -->
  <line x1="45" y1="115" x2="50" y2="110" stroke="white" stroke-width="2" opacity="0.4"/>
  <line x1="55" y1="95" x2="60" y2="90" stroke="white" stroke-width="2" opacity="0.5"/>
  <line x1="72" y1="78" x2="77" y2="73" stroke="white" stroke-width="2" opacity="0.6"/>
  <line x1="95" y1="68" x2="100" y2="63" stroke="white" stroke-width="2" opacity="0.7"/>
  <line x1="118" y1="72" x2="122" y2="67" stroke="white" stroke-width="2" opacity="0.8"/>
  <line x1="138" y1="82" x2="142" y2="77" stroke="white" stroke-width="2" opacity="0.9"/>
  
  <!-- Speedometer needle -->
  <line x1="100" y1="120" x2="135" y2="75" stroke="white" stroke-width="3" stroke-linecap="round" filter="url(#speedGlow)"/>
  <circle cx="100" cy="120" r="8" fill="url(#speedGrad)" filter="url(#speedShadow)"/>
  <circle cx="100" cy="120" r="4" fill="white" opacity="0.8"/>
  
  <!-- Lightning bolt -->
  <path d="M 105 45 L 90 95 L 102 95 L 95 135 L 115 80 L 103 80 Z" fill="url(#meterGrad)" filter="url(#speedGlow)"/>
  
  <!-- Speed lines -->
  <line x1="30" y1="130" x2="50" y2="130" stroke="url(#speedGrad)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="25" y1="138" x2="45" y2="138" stroke="url(#speedGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="150" y1="130" x2="170" y2="130" stroke="url(#speedGrad)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="155" y1="138" x2="175" y2="138" stroke="url(#speedGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  
  <!-- Floating particles -->
  <circle cx="60" cy="55" r="2" fill="white" opacity="0.4"/>
  <circle cx="145" cy="50" r="1.5" fill="url(#speedGrad)" opacity="0.5"/>
  <circle cx="155" cy="145" r="2" fill="white" opacity="0.3"/>
  <circle cx="45" cy="148" r="1.5" fill="url(#meterGrad)" opacity="0.4"/>
</svg>
