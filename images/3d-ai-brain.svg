<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="brain1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a9eff"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="node1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff"/>
      <stop offset="100%" style="stop-color:#c7d2fe"/>
    </linearGradient>
    <filter id="shadow1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#4a9eff" flood-opacity="0.3"/>
    </filter>
    <filter id="glow1" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="sphere1" cx="35%" cy="35%" r="65%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#3b0764"/>
    </radialGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="url(#bg1)" opacity="0.15"/>
  <circle cx="100" cy="100" r="70" fill="url(#bg1)" opacity="0.25"/>
  <!-- 3D Brain shape -->
  <g filter="url(#shadow1)">
    <ellipse cx="100" cy="95" rx="45" ry="50" fill="url(#brain1)" opacity="0.9"/>
    <ellipse cx="100" cy="95" rx="38" ry="43" fill="url(#brain1)" opacity="0.6"/>
  </g>
  <!-- Brain folds -->
  <path d="M70 75 Q85 60 100 70 Q115 60 130 75" stroke="#fff" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M72 90 Q85 80 100 88 Q115 80 128 90" stroke="#fff" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M75 105 Q88 96 100 103 Q112 96 125 105" stroke="#fff" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M78 120 Q88 114 100 118 Q112 114 122 120" stroke="#fff" stroke-width="1.5" fill="none" opacity="0.3"/>
  <!-- Neural network nodes -->
  <g filter="url(#glow1)">
    <circle cx="85" cy="70" r="5" fill="url(#node1)"/>
    <circle cx="115" cy="70" r="5" fill="url(#node1)"/>
    <circle cx="100" cy="85" r="6" fill="url(#node1)"/>
    <circle cx="80" cy="100" r="5" fill="url(#node1)"/>
    <circle cx="120" cy="100" r="5" fill="url(#node1)"/>
    <circle cx="90" cy="115" r="4" fill="url(#node1)"/>
    <circle cx="110" cy="115" r="4" fill="url(#node1)"/>
  </g>
  <!-- Connection lines -->
  <g stroke="#fff" stroke-width="1" opacity="0.4">
    <line x1="85" y1="70" x2="100" y2="85"/>
    <line x1="115" y1="70" x2="100" y2="85"/>
    <line x1="85" y1="70" x2="80" y2="100"/>
    <line x1="115" y1="70" x2="120" y2="100"/>
    <line x1="100" y1="85" x2="80" y2="100"/>
    <line x1="100" y1="85" x2="120" y2="100"/>
    <line x1="80" y1="100" x2="90" y2="115"/>
    <line x1="120" y1="100" x2="110" y2="115"/>
    <line x1="90" y1="115" x2="110" y2="115"/>
  </g>
  <!-- 3D highlight -->
  <ellipse cx="88" cy="78" rx="15" ry="18" fill="white" opacity="0.1"/>
  <!-- Floating particles -->
  <circle cx="55" cy="55" r="3" fill="#4a9eff" opacity="0.6"/>
  <circle cx="145" cy="50" r="2" fill="#8b5cf6" opacity="0.5"/>
  <circle cx="150" cy="130" r="2.5" fill="#ec4899" opacity="0.4"/>
  <circle cx="50" cy="140" r="2" fill="#4a9eff" opacity="0.5"/>
</svg>