<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="cpu1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a9eff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cpu2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#6db3ff;stop-opacity:0.4" />
    </linearGradient>
    <filter id="cpuShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#22c55e" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- CPU Body -->
  <rect x="34" y="34" width="60" height="60" rx="8" fill="url(#cpu1)" filter="url(#cpuShadow)"/>
  <!-- Inner chip -->
  <rect x="44" y="44" width="40" height="40" rx="4" fill="rgba(0,0,0,0.3)"/>
  <!-- Circuit traces -->
  <line x1="50" y1="34" x2="50" y2="24" stroke="url(#cpu1)" stroke-width="3" stroke-linecap="round"/>
  <line x1="64" y1="34" x2="64" y2="20" stroke="url(#cpu1)" stroke-width="3" stroke-linecap="round"/>
  <line x1="78" y1="34" x2="78" y2="24" stroke="url(#cpu1)" stroke-width="3" stroke-linecap="round"/>
  <line x1="50" y1="94" x2="50" y2="104" stroke="url(#cpu1)" stroke-width="3" stroke-linecap="round"/>
  <line x1="64" y1="94" x2="64" y2="108" stroke="url(#cpu1)" stroke-width="3" stroke-linecap="round"/>
  <line x1="78" y1="94" x2="78" y2="104" stroke="url(#cpu1)" stroke-width="3" stroke-linecap="round"/>
  <line x1="34" y1="50" x2="24" y2="50" stroke="url(#cpu1)" stroke-width="3" stroke-linecap="round"/>
  <line x1="34" y1="64" x2="20" y2="64" stroke="url(#cpu1)" stroke-width="3" stroke-linecap="round"/>
  <line x1="34" y1="78" x2="24" y2="78" stroke="url(#cpu1)" stroke-width="3" stroke-linecap="round"/>
  <line x1="94" y1="50" x2="104" y2="50" stroke="url(#cpu1)" stroke-width="3" stroke-linecap="round"/>
  <line x1="94" y1="64" x2="108" y2="64" stroke="url(#cpu1)" stroke-width="3" stroke-linecap="round"/>
  <line x1="94" y1="78" x2="104" y2="78" stroke="url(#cpu1)" stroke-width="3" stroke-linecap="round"/>
  <!-- Center core -->
  <circle cx="64" cy="64" r="10" fill="rgba(255,255,255,0.3)"/>
  <circle cx="64" cy="64" r="5" fill="white" opacity="0.8"/>
  <!-- Corner contacts -->
  <rect x="40" y="40" width="6" height="6" rx="1" fill="rgba(255,255,255,0.5)"/>
  <rect x="82" y="40" width="6" height="6" rx="1" fill="rgba(255,255,255,0.5)"/>
  <rect x="40" y="82" width="6" height="6" rx="1" fill="rgba(255,255,255,0.5)"/>
  <rect x="82" y="82" width="6" height="6" rx="1" fill="rgba(255,255,255,0.5)"/>
</svg>
