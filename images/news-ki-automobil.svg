<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a9eff"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Car silhouette -->
  <path d="M150,320 L180,280 L250,250 L350,230 L500,230 L600,250 L650,280 L680,320 L680,340 L650,340 L650,320 L600,320 L580,340 L220,340 L200,320 L150,320 Z" fill="#2a2a4a" stroke="url(#accent)" stroke-width="2"/>
  <!-- Wheels -->
  <circle cx="250" cy="340" r="25" fill="#1a1a2e" stroke="#4a9eff" stroke-width="3"/>
  <circle cx="580" cy="340" r="25" fill="#1a1a2e" stroke="#4a9eff" stroke-width="3"/>
  <!-- AI Circuit lines -->
  <line x1="300" y1="200" x2="400" y2="180" stroke="#8b5cf6" stroke-width="2" opacity="0.6"/>
  <line x1="400" y1="180" x2="500" y2="200" stroke="#8b5cf6" stroke-width="2" opacity="0.6"/>
  <line x1="400" y1="180" x2="400" y2="140" stroke="#4a9eff" stroke-width="2" opacity="0.6"/>
  <circle cx="300" cy="200" r="6" fill="#4a9eff"/>
  <circle cx="400" cy="180" r="8" fill="#8b5cf6"/>
  <circle cx="500" cy="200" r="6" fill="#4a9eff"/>
  <circle cx="400" cy="140" r="6" fill="#8b5cf6"/>
  <!-- Text -->
  <text x="400" y="80" text-anchor="middle" fill="white" font-size="28" font-weight="bold" font-family="Arial, sans-serif">KI in der Automobilindustrie</text>
  <text x="400" y="110" text-anchor="middle" fill="#8b5cf6" font-size="16" font-family="Arial, sans-serif">2026 — Autonomes Fahren &amp; Predictive Maintenance</text>
  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="30" fill="none" stroke="#4a9eff" stroke-width="1" opacity="0.3"/>
  <circle cx="700" cy="350" r="40" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.3"/>
  <circle cx="720" cy="80" r="20" fill="none" stroke="#4a9eff" stroke-width="1" opacity="0.2"/>
</svg>
