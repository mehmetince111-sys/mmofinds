<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="globeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00f2fe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#43e97b;stop-opacity:1" />
    </linearGradient>
    <filter id="globeShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#4facfe" flood-opacity="0.4"/>
    </filter>
    <filter id="globeGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background glow -->
  <circle cx="100" cy="100" r="80" fill="url(#globeGrad)" opacity="0.1" filter="url(#globeShadow)"/>
  
  <!-- Globe sphere -->
  <circle cx="100" cy="100" r="55" fill="url(#globeGrad)" opacity="0.2" filter="url(#globeShadow)"/>
  <circle cx="100" cy="100" r="55" fill="none" stroke="url(#globeGrad)" stroke-width="2" opacity="0.6"/>
  
  <!-- Globe grid lines - horizontal -->
  <ellipse cx="100" cy="100" rx="55" ry="20" fill="none" stroke="white" stroke-width="0.8" opacity="0.3"/>
  <ellipse cx="100" cy="100" rx="55" ry="40" fill="none" stroke="white" stroke-width="0.8" opacity="0.25"/>
  <line x1="45" y1="100" x2="155" y2="100" stroke="white" stroke-width="0.8" opacity="0.3"/>
  
  <!-- Globe grid lines - vertical -->
  <ellipse cx="100" cy="100" rx="20" ry="55" fill="none" stroke="white" stroke-width="0.8" opacity="0.3"/>
  <ellipse cx="100" cy="100" rx="40" ry="55" fill="none" stroke="white" stroke-width="0.8" opacity="0.25"/>
  <line x1="100" y1="45" x2="100" y2="155" stroke="white" stroke-width="0.8" opacity="0.3"/>
  
  <!-- Connection nodes on globe -->
  <circle cx="75" cy="80" r="5" fill="url(#globeGrad)" filter="url(#globeGlow)"/>
  <circle cx="125" cy="75" r="4.5" fill="url(#globeGrad)" filter="url(#globeGlow)"/>
  <circle cx="90" cy="115" r="5" fill="url(#globeGrad)" filter="url(#globeGlow)"/>
  <circle cx="115" cy="110" r="4" fill="url(#globeGrad)" filter="url(#globeGlow)"/>
  <circle cx="100" cy="65" r="4" fill="url(#globeGrad)" filter="url(#globeGlow)"/>
  
  <!-- Connection arcs -->
  <path d="M 75 80 Q 100 60 125 75" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <path d="M 75 80 Q 80 100 90 115" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <path d="M 125 75 Q 120 95 115 110" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <path d="M 90 115 Q 105 100 115 110" fill="none" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <path d="M 100 65 Q 110 70 125 75" fill="none" stroke="white" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Satellite dish / antenna -->
  <path d="M 100 45 L 100 30" stroke="url(#globeGrad)" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <path d="M 92 35 Q 100 25 108 35" fill="none" stroke="url(#globeGrad)" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  
  <!-- Signal waves -->
  <path d="M 95 28 Q 100 20 105 28" fill="none" stroke="url(#globeGrad)" stroke-width="1" opacity="0.4"/>
  <path d="M 90 25 Q 100 12 110 25" fill="none" stroke="url(#globeGrad)" stroke-width="1" opacity="0.3"/>
  
  <!-- Floating data particles -->
  <circle cx="50" cy="60" r="2" fill="url(#globeGrad)" opacity="0.5"/>
  <circle cx="150" cy="55" r="2.5" fill="url(#globeGrad)" opacity="0.4"/>
  <circle cx="45" cy="140" r="2" fill="url(#globeGrad)" opacity="0.3"/>
  <circle cx="155" cy="135" r="2" fill="url(#globeGrad)" opacity="0.4"/>
  <circle cx="60" cy="150" r="1.5" fill="white" opacity="0.3"/>
  <circle cx="140" cy="148" r="1.5" fill="white" opacity="0.3"/>
  
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="url(#globeGrad)" stroke-width="0.5" stroke-dasharray="3 5" opacity="0.3"/>
</svg>
