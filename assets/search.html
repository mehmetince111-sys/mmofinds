    <div class="container">
        <h1>🔍 Suche</h1>
        <p>Durchsuche alle Artikel, Reviews und DIY-Anleitungen</p>
        
        <div class="search-container" style="margin:30px auto;">
            <input type="text" class="search-input" id="searchInput" placeholder="Suchbegriff eingeben..." autocomplete="off">
        </div>
        
        <div id="searchResults" class="search-results"></div>
    </div>
    
    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2025 MMOFinds. Alle Rechte vorbehalten.</p>
            <div class="footer-links">
                <a href="/impressum.html">Impressum</a>
                <a href="/datenschutz.html">Datenschutz</a>
                <a href="/affiliate-info.html">Affiliate-Hinweis</a>
            </div>
        </div>
    </footer>
    
    <script>
        let allResults = [];
        
        // Index laden
        fetch('/assets/js/search-index.json')
            .then(response => response.json())
            .then(data => {
                allResults = data;
                console.log("Suchindex geladen: " + data.length + " Seiten");
            })
            .catch(err => console.error("Fehler beim Laden des Suchindex:", err));
        
        // Suche
        const searchInput = document.getElementById('searchInput');
        const searchResults = document.getElementById('searchResults');
        
        searchInput.addEventListener('input', function() {
            const query = this.value.toLowerCase().trim();
            
            if (query.length < 2) {
                searchResults.innerHTML = '';
                return;
            }
            
            // Ergebnisse filtern
            const results = allResults.filter(item => {
                return item.title.toLowerCase().includes(query) ||
                       item.description.toLowerCase().includes(query) ||
                       item.content.toLowerCase().includes(query);
            });
            
            // Ergebnisse anzeigen
            if (results.length === 0) {
                searchResults.innerHTML = `
                    <div class="no-results">
                        <div class="emoji">🔍</div>
                        <h3>Keine Ergebnisse gefunden</h3>
                        <p>Versuche es mit anderen Suchbegriffen</p>
                    </div>
                `;
            } else {
                searchResults.innerHTML = results.map(result => `
                    <div class="search-result">
                        <span class="category">${result.category}</span>
                        <h3><a href="${result.url}">${result.title}</a></h3>
                        <p>${result.description || result.content}</p>
                    </div>
                `).join('');
            }
        });
    </script>
